<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登録 - 音MAP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* registry固有のスタイル */
    #previewMap {
      height: 200px;
      width: 100%;
      background: #e5e5ea;
      margin-top: -0.5px;
      border-bottom: 0.5px solid var(--ios-border);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="header-btn back">マップ</a>
    <h1>新規登録</h1>
    <div class="header-spacer"></div>
  </header>

  <main>
    <form id="addForm">
      
      <div class="section-title">位置情報の特定</div>
      <div class="list-group">
        <div class="list-cell">
          <label>事業者</label>
          <select id="companySelect" required>
            <option value="">読込中...</option>
          </select>
        </div>
        <div class="list-cell">
          <label>路線</label>
          <select id="lineSelect" required disabled>
            <option value="">事業者を選択</option>
          </select>
        </div>
        <div class="list-cell">
          <label>駅</label>
          <select id="stationSelect" required disabled>
            <option value="">路線を選択</option>
          </select>
        </div>
      </div>

      <div id="previewMap"></div>

      <div id="suggestionBox" style="display: none; margin: 16px; padding: 12px; background-color: #E5F0FF; border-radius: 8px; border: 1px solid #007AFF;">
        <div style="font-size: 13px; font-weight: bold; color: #007AFF; margin-bottom: 8px;">
          この駅には既に以下の作品が登録されています。重複していませんか？
        </div>
        <ul id="suggestionList" style="margin: 0; padding-left: 20px; font-size: 14px; line-height: 1.5;"></ul>
      </div>
      <div class="section-title">作品情報</div>
      <div class="list-group">
        <div class="list-cell">
          <label>タイトル</label>
          <input type="text" id="title" placeholder="入力必須" required>
        </div>
        <div class="list-cell">
          <label>URL</label>
          <input type="url" id="url" placeholder="https://..." required>
        </div>

        <div class="list-cell">
          <label>備考</label>
          <input type="text" id="remarks" placeholder="任意 (例: 1:23～見どころ)">
        </div>

        <div class="list-cell">
          <label>カテゴリ</label>
          <select id="category" required>
            <option value="下車">下車</option>
            <option value="ZONE">ZONE</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>

      <div class="btn-container">
        <button type="submit" class="submit-btn" id="submitBtn">登録する</button>
      </div>

    </form>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/registry.js"></script>
</body>
</html>
